repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.0
    hooks:
      - id: ruff
        args: [ --fix ]
      - id: ruff-format
  - repo: local
    hooks:
      - id: tests
        name: AI Verification Tests
        entry: pytest tests/
        language: system
        pass_filenames: false
