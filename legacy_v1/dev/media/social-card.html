<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1200" />
  <title>claude-scaffold — social card</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      height: 100%;
    }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background-color: #1e1e2e;
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      color: #cdd6f4;
      position: relative;
    }

    /* Subtle dot grid background */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, #313244 1px, transparent 1px);
      background-size: 32px 32px;
      background-position: 0 0;
      opacity: 0.55;
      pointer-events: none;
      z-index: 0;
    }

    /* Gradient vignette over the grid */
    body::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 120% 100% at 50% 50%, transparent 30%, #1e1e2e 80%);
      pointer-events: none;
      z-index: 1;
    }

    /* Top accent line — gradient rainbow strip */
    .accent-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(
        90deg,
        #89b4fa 0%,
        #cba6f7 25%,
        #f38ba8 50%,
        #f9e2af 75%,
        #a6e3a1 100%
      );
      z-index: 10;
    }

    .card {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 52px 64px 48px;
      z-index: 5;
    }

    /* ── TOP ROW ── */
    .top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .terminal-prompt {
      display: inline-flex;
      align-items: center;
      gap: 0;
      background: #313244;
      border: 1px solid #45475a;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.01em;
    }

    .prompt-dollar {
      color: #a6e3a1;
      margin-right: 8px;
      font-weight: 700;
    }

    .prompt-cmd {
      color: #cdd6f4;
    }

    .prompt-cmd .cmd-npx {
      color: #89b4fa;
    }

    .prompt-cmd .cmd-pkg {
      color: #f9e2af;
    }

    .prompt-cmd .cmd-sub {
      color: #a6e3a1;
    }

    .prompt-cursor {
      display: inline-block;
      width: 2px;
      height: 16px;
      background: #a6e3a1;
      margin-left: 4px;
      border-radius: 1px;
      animation: blink 1.1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    .logo-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      opacity: 0.5;
    }

    .logo-badge .badge-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #cba6f7;
    }

    .logo-badge .badge-label {
      font-size: 13px;
      font-weight: 500;
      color: #6c7086;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── CENTER ── */
    .center {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 22px;
      flex: 1;
      justify-content: center;
      padding: 0 0 8px;
    }

    .headline {
      font-size: 72px;
      font-weight: 700;
      color: #cdd6f4;
      line-height: 1.05;
      letter-spacing: -0.02em;
    }

    .headline .hl-accent {
      color: #cba6f7;
    }

    .subtitle {
      display: flex;
      align-items: center;
      gap: 0;
      font-size: 20px;
      font-weight: 400;
      color: #6c7086;
      letter-spacing: 0.02em;
    }

    .subtitle .sub-item {
      color: #7f849c;
    }

    .subtitle .sub-sep {
      color: #45475a;
      margin: 0 14px;
      font-weight: 300;
    }

    .subtitle .sub-highlight {
      color: #94e2d5;
    }

    /* ── BOTTOM ROW ── */
    .bottom-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }

    .stats-strip {
      display: flex;
      align-items: stretch;
      gap: 0;
      background: #181825;
      border: 1px solid #313244;
      border-radius: 12px;
      overflow: hidden;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: 18px 32px;
      gap: 4px;
      position: relative;
    }

    .stat + .stat::before {
      content: '';
      position: absolute;
      left: 0;
      top: 16px;
      bottom: 16px;
      width: 1px;
      background: #313244;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .stat-label {
      font-size: 12px;
      font-weight: 500;
      color: #6c7086;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .stat-blue  .stat-value { color: #89b4fa; }
    .stat-green .stat-value { color: #a6e3a1; }
    .stat-mauve .stat-value { color: #cba6f7; }

    .repo-ref {
      font-size: 14px;
      font-weight: 400;
      color: #45475a;
      letter-spacing: 0.02em;
      padding-bottom: 4px;
    }

    .repo-ref .repo-user {
      color: #585b70;
    }

    .repo-ref .repo-sep {
      color: #313244;
    }

    .repo-ref .repo-name {
      color: #585b70;
    }
  </style>
</head>
<body>

  <div class="accent-bar"></div>

  <div class="card">

    <!-- TOP ROW -->
    <div class="top-row">
      <div class="terminal-prompt">
        <span class="prompt-dollar">$</span>
        <span class="prompt-cmd">
          <span class="cmd-npx">npx</span>
          &nbsp;<span class="cmd-pkg">claude-scaffold</span>
          &nbsp;<span class="cmd-sub">init</span>
        </span>
        <span class="prompt-cursor"></span>
      </div>
      <div class="logo-badge">
        <span class="badge-dot"></span>
        <span class="badge-label">Claude Code Infrastructure</span>
      </div>
    </div>

    <!-- CENTER -->
    <div class="center">
      <div class="headline">
        One command.<br>
        <span class="hl-accent">Every repo.</span>
      </div>
      <div class="subtitle">
        <span class="sub-item">CLAUDE.md</span>
        <span class="sub-sep">·</span>
        <span class="sub-item">hooks</span>
        <span class="sub-sep">·</span>
        <span class="sub-highlight">18 skills</span>
        <span class="sub-sep">·</span>
        <span class="sub-item">agents</span>
      </div>
    </div>

    <!-- BOTTOM ROW -->
    <div class="bottom-row">
      <div class="stats-strip">
        <div class="stat stat-blue">
          <span class="stat-value">500+</span>
          <span class="stat-label">downloads</span>
        </div>
        <div class="stat stat-green">
          <span class="stat-value">226</span>
          <span class="stat-label">Jest tests</span>
        </div>
        <div class="stat stat-mauve">
          <span class="stat-value">18</span>
          <span class="stat-label">domain skills</span>
        </div>
      </div>
      <div class="repo-ref">
        <span class="repo-user">pyramidheadshark</span>
        <span class="repo-sep">/</span>
        <span class="repo-name">claude-scaffold</span>
      </div>
    </div>

  </div>

</body>
</html>
