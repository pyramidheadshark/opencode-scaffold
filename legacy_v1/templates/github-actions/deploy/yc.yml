# Deploy fragment: Yandex Cloud Container Registry + Serverless Container
#
# Required secrets (set in GitHub repo → Settings → Secrets):
#   YC_SA_JSON_CREDENTIALS  — service account key JSON (iam.serviceAccounts.keys.create)
#   YC_REGISTRY_ID          — YC Container Registry ID (e.g. crp0a1...)
#   YC_CONTAINER_ID         — YC Serverless Container ID (e.g. bba0a1...)
#   YC_SA_ID                — Service account ID for container execution
#
# Required variables (Settings → Variables):
#   YC_IMAGE_NAME           — image name, e.g. "my-service"

name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: cr.yandex
  IMAGE_NAME: ${{ vars.YC_IMAGE_NAME }}

jobs:
  deploy:
    name: Deploy to Yandex Cloud
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to YC Container Registry
        run: |
          echo '${{ secrets.YC_SA_JSON_CREDENTIALS }}' | \
          docker login ${{ env.REGISTRY }} -u json_key --password-stdin

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ secrets.YC_REGISTRY_ID }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ secrets.YC_REGISTRY_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install YC CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash
          echo "$HOME/yandex-cloud/bin" >> $GITHUB_PATH

      - name: Deploy new revision
        run: |
          echo '${{ secrets.YC_SA_JSON_CREDENTIALS }}' > /tmp/sa-key.json
          yc config set service-account-key /tmp/sa-key.json
          yc serverless container revision deploy \
            --container-id ${{ secrets.YC_CONTAINER_ID }} \
            --image ${{ env.REGISTRY }}/${{ secrets.YC_REGISTRY_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --service-account-id ${{ secrets.YC_SA_ID }} \
            --execution-timeout 60s \
            --memory 512MB
          rm /tmp/sa-key.json
