# Deploy fragment: VPS / bare metal via SSH + docker-compose
#
# Required secrets (set in GitHub repo → Settings → Secrets):
#   SSH_HOST          — server IP or hostname
#   SSH_USER          — SSH user (e.g. deploy)
#   SSH_PRIVATE_KEY   — private key for SSH auth (RSA or ED25519)
#   GHCR_TOKEN        — GitHub token to pull image on server (github.token or PAT)
#
# Required variables (Settings → Variables):
#   DEPLOY_PATH       — path on server, e.g. /srv/my-service
#
# Assumptions:
#   - docker-compose.yml is in DEPLOY_PATH on the server
#   - Image is pushed to GitHub Container Registry (ghcr.io)
#   - docker-compose.yml references the image as ghcr.io/{owner}/{repo}:latest

name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  push-image:
    name: Push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: push-image
    environment: production
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo ${{ secrets.GHCR_TOKEN }} | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd ${{ vars.DEPLOY_PATH }}
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
