# CI profile: fastapi-db
# For: FastAPI + PostgreSQL + Alembic migrations (full web service with DB)
# Standard: lint + typecheck + test (postgres service) + migration-check + docker-build

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - run: uv python install
      - run: uv sync --all-groups
      - run: uv run ruff check . --output-format=github
      - run: uv run ruff format --check .

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - run: uv python install
      - run: uv sync --all-groups
      - run: uv run mypy src/

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - run: uv python install
      - run: uv sync --all-groups

      - name: Run tests
        env:
          ENVIRONMENT: test
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test_db
        run: uv run pytest --cov=src --cov-report=xml --cov-fail-under=70

      - uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          fail_ci_if_error: false

  migration-check:
    name: Migration check
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - run: uv python install
      - run: uv sync --all-groups

      - name: Apply migrations
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test_db
        run: uv run alembic upgrade head

      - name: Check for migration drift
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test_db
        run: uv run alembic check

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, migration-check]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
