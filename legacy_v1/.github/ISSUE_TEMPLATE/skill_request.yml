name: Skill Request
description: Request a new skill for claude-scaffold
labels: ["skill-request"]
body:
  - type: markdown
    attributes:
      value: |
        Skills inject domain-specific knowledge into Claude Code automatically. Describe what you need.

  - type: input
    id: skill-name
    attributes:
      label: Skill name
      placeholder: "e.g. fastapi-patterns, experiment-tracking"
    validations:
      required: true

  - type: textarea
    id: trigger-conditions
    attributes:
      label: Trigger conditions
      description: What files or keywords should activate this skill?
      placeholder: |
        Files: mlflow.py, experiment*.py
        Keywords: mlflow, experiment, model registry
    validations:
      required: true

  - type: textarea
    id: content
    attributes:
      label: What should the skill inject?
      description: Describe the patterns, pitfalls, code examples, or domain knowledge this skill should provide
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, references, or examples that would help build this skill
