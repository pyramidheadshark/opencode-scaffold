name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement to claude-scaffold!

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve? What is currently painful or missing?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you want to happen
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider?

  - type: dropdown
    id: audience
    attributes:
      label: Primary target audience
      options:
        - ML engineer
        - AI developer (LLM/Claude API)
        - FastAPI backend developer
        - Full stack developer
        - All profiles
    validations:
      required: true
