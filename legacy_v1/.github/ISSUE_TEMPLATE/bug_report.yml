name: Bug Report
description: Report a bug in claude-scaffold
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows 11 (Git Bash)
        - macOS 14+
        - Ubuntu 22.04+
        - Other Linux
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "e.g. 20.11.0"
    validations:
      required: true

  - type: input
    id: scaffold-version
    attributes:
      label: claude-scaffold version
      placeholder: "e.g. 1.0.0 (run: npx claude-scaffold --version)"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `npx claude-scaffold init ...`
        2. Open Claude Code
        3. Type a prompt about ...
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Paste any error messages, logs, or screenshots here
