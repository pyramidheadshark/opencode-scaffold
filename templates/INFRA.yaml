# Infrastructure Manifest
# Machine-readable infra config. Prevents hallucinations of IPs, hostnames, ports.
# Summary injected at session start. Full manifest via /infra command.

vms:
  # my-server-01:
  #   vpc_ip: "192.168.0.10"
  #   public_ip: "1.2.3.4"
  #   role: app-server
  #   ssh_alias: my-server-01

rules:
  - "NEVER use public IP for intra-host communication"
  - "Always verify VPC IP from this manifest, not from memory"
  - "prevent_destroy on all production VMs"

