# CI profile: minimal
# For: data analysis scripts, CLI tools, web scrapers — no Docker required
# Standard: lint + typecheck + test (coverage 70%)

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - run: uv python install
      - run: uv sync --all-groups
      - run: uv run ruff check . --output-format=github
      - run: uv run ruff format --check .

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - run: uv python install
      - run: uv sync --all-groups
      - run: uv run mypy src/

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - run: uv python install
      - run: uv sync --all-groups

      - name: Run tests
        env:
          ENVIRONMENT: test
        run: uv run pytest --cov=src --cov-report=xml --cov-fail-under=70

      - uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          fail_ci_if_error: false
